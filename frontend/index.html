<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#6366f1" />
  <meta name="background-color" content="#0f172a" />
  <meta name="description" content="Professional AI content generation platform - Image, Video, Audio and Chat" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ZexAi" />
  <meta name="application-name" content="ZexAi" />
  <meta name="msapplication-TileColor" content="#6366f1" />
  <meta name="msapplication-tap-highlight" content="no" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="/logo192.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192.png" />

  <!-- Splash Screens for iOS -->
  <link rel="apple-touch-startup-image" href="/icons/splash-1125x2436.png"
    media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="/icons/splash-1242x2688.png"
    media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="/icons/splash-828x1792.png"
    media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />

  <!-- SEO -->
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="ZexAi" />
  <meta property="og:description" content="Professional AI content generation platform" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/icons/icon-512.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <title>ZexAi - Professional AI Content Generation Platform</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Prevent flash of unstyled content -->
  <style>
    html {
      background-color: #0f172a;
    }

    body {
      margin: 0;
    }

    #root {
      min-height: 100vh;
    }

    .pwa-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      z-index: 9999;
      transition: opacity 0.3s;
    }

    .dark .pwa-splash {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    .pwa-splash.loaded {
      opacity: 0;
      pointer-events: none;
    }

    .pwa-splash .logo {
      width: 120px;
      height: 120px;
      animation: pulse 1.5s infinite;
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.1);
        opacity: 0.8;
      }
    }
  </style>
</head>

<body>
  <!-- Splash Screen -->
  <div class="pwa-splash" id="pwa-splash">
    <img src="/logo192.png" alt="ZexAi Loading" class="logo" />
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Service Worker Registration -->
  <script>
    // Remove splash screen when app loads
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('pwa-splash');
        if (splash) splash.classList.add('loaded');
      }, 500);
    });
    // Register Service Worker and Catch PWA Install Prompt Early
    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent the mini-infobar from appearing on mobile
      e.preventDefault();
      // Stash the event so it can be triggered later by React's PWAInstallPrompt.tsx
      window.deferredPWAEvent = e;
      console.log("[PWA] Install Prompt Captured early in index.html");
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/sw.js', {
            scope: '/'
          });
          console.log('[PWA] Service Worker registered:', registration.scope);

          // Check for updates
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // New version available
                console.log('[PWA] New version available');
                if (confirm('New version available! Would you like to refresh the page?')) {
                  window.location.reload();
                }
              }
            });
          });
        } catch (error) {
          console.log('[PWA] Service Worker registration failed:', error);
        }
      });
    }
  </script>
</body>

</html>
