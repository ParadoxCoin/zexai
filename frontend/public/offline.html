<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çevrimdışı - ZexAi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .retry-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status.online .status-dot {
            background: #22c55e;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Çevrimdışısınız</h1>
        <p>
            İnternet bağlantınız kesildi. Lütfen bağlantınızı kontrol edin ve tekrar deneyin.
        </p>
        <button class="retry-btn" onclick="checkConnection()">
            Tekrar Dene
        </button>
        <div class="status" id="status">
            <div class="status-dot"></div>
            <span id="status-text">Bağlantı bekleniyor...</span>
        </div>
    </div>

    <script>
        function checkConnection() {
            if (navigator.onLine) {
                window.location.reload();
            } else {
                document.getElementById('status-text').textContent = 'Hala çevrimdışı...';
            }
        }

        // Auto-check connection
        window.addEventListener('online', () => {
            const status = document.getElementById('status');
            status.classList.add('online');
            document.getElementById('status-text').textContent = 'Bağlantı kuruldu!';
            setTimeout(() => window.location.reload(), 1000);
        });

        window.addEventListener('offline', () => {
            const status = document.getElementById('status');
            status.classList.remove('online');
            document.getElementById('status-text').textContent = 'Çevrimdışı...';
        });

        // Check initial state
        if (navigator.onLine) {
            document.getElementById('status').classList.add('online');
            document.getElementById('status-text').textContent = 'Bağlantı mevcut';
        }
    </script>
</body>

</html>
